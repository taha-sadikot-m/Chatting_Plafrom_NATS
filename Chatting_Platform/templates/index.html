<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatRoom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- ── Login Screen ──────────────────────────────────────── -->
    <div id="login-screen">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-comments"></i></div>
            <h2>ChatRoom</h2>
            <p>Real-time messaging platform</p>
            <div id="login-error" class="alert alert-danger d-none mb-3"></div>
            <button class="btn-login" onclick="loginWithCognito()">
                <i class="fas fa-sign-in-alt me-2"></i>Login with AWS Cognito
            </button>
            <p class="mt-3 mb-0" style="font-size:.78rem;color:#9ca3af;">Secured by AWS Cognito</p>
        </div>
    </div>

    <!-- ── Main App ──────────────────────────────────────────── -->
    <div id="main-app" class="d-none">

        <!-- Sidebar -->
        <div id="sidebar">

            <div class="sidebar-header">
                <span class="brand">
                    <i class="fas fa-comment-dots me-2" style="color:#25d366"></i>ChatRoom
                </span>
                <div class="header-actions">
                    <span id="connection-dot" class="connection-dot offline" title="Connection status"></span>
                    <button class="icon-btn" onclick="showProfile()" title="Profile">
                        <i class="fas fa-user-circle"></i>
                    </button>
                    <button class="icon-btn" onclick="logout()" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>

            <div class="search-wrap">
                <input type="text" id="search-input" placeholder="&#xf002; Search users..." autocomplete="off">
            </div>

            <div id="users-list">
                <div class="empty-list">
                    <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                    <p class="mt-2 mb-0">Loading users...</p>
                </div>
            </div>

        </div><!-- /sidebar -->

        <!-- Chat Area -->
        <div id="chat-area">

            <!-- Empty state -->
            <div id="chat-empty" class="chat-empty-state">
                <i class="fas fa-comments"></i>
                <h4>Welcome to ChatRoom</h4>
                <p>Select a contact to start messaging</p>
            </div>

            <!-- Chat header -->
            <div id="chat-header" class="d-none">
                <div id="header-avatar"></div>
                <div style="flex:1;min-width:0;">
                    <div id="header-name"></div>
                    <div id="header-status"></div>
                </div>
                <div style="display:flex;gap:6px;">
                    <button class="icon-btn"><i class="fas fa-phone"></i></button>
                    <button class="icon-btn"><i class="fas fa-video"></i></button>
                </div>
            </div>

            <!-- Messages -->
            <div id="messages-area" class="d-none"></div>

            <!-- Typing indicator -->
            <div id="typing-indicator" class="typing-indicator d-none">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
                <small>typing...</small>
            </div>

            <!-- Input area -->
            <div id="message-input-area" class="d-none">
                <form id="message-form">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <button type="submit" class="btn-send">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>

        </div><!-- /chat-area -->

    </div><!-- /main-app -->

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Profile Modal -->
    <div class="modal fade" id="profileModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">My Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center pt-2">
                    <div id="profile-avatar" class="mb-3 d-flex justify-content-center"></div>
                    <h5 class="fw-bold mb-0" id="profile-name"></h5>
                    <p class="text-muted" id="profile-email"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
