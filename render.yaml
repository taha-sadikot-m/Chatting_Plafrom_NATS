services:
  - type: web
    name: livekit-meeting-room
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app:app
    healthCheckPath: /health
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"
      - key: ROOM_TTL_HOURS
        value: "24"
